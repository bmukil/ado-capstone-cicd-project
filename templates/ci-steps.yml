parameters:
  nodeVersion: '18.x'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: ${{ parameters.nodeVersion }}

- script: |
    cd app
    npm install
  displayName: Install dependencies

- script: |
    cd app
    npm test
  displayName: Run tests

- script: |
    cd app
    npm run build
  displayName: Build app